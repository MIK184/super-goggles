name: Windows Cloud PC

on:
  workflow_dispatch:

jobs:
  cloud-pc:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:

    - name: Setup Windows User and RDP
      shell: powershell
      run: |
        net user WiNSOS "WiNSOS@2024!" /add
        net localgroup Administrators WiNSOS /add
        net localgroup "Remote Desktop Users" WiNSOS /add
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 0
        Write-Host "RDP ready - User: WiNSOS / Pass: WiNSOS@2024!"

    - name: Disable Firewall and Open All Ports
      shell: powershell
      run: |
        netsh advfirewall set allprofiles state off
        Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False
        $tcp = @(3389,47984,47989,47990,47998,47999,48000,48002,48010,48011,48012)
        $udp = @(47998,47999,48000,48002,48010,48011,48012,41641)
        foreach ($p in $tcp) {
          netsh advfirewall firewall add rule name="TCP_$p" dir=in action=allow protocol=TCP localport=$p | Out-Null
          netsh advfirewall firewall add rule name="TCP_OUT_$p" dir=out action=allow protocol=TCP localport=$p | Out-Null
        }
        foreach ($p in $udp) {
          netsh advfirewall firewall add rule name="UDP_$p" dir=in action=allow protocol=UDP localport=$p | Out-Null
        }
        Write-Host "Firewall OFF - All ports opened"

    - name: Install Tailscale
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "ts.exe" -UseBasicParsing
        Start-Process "ts.exe" -Args "/S" -Wait
        Start-Sleep -Seconds 12
        Write-Host "Tailscale installed"

    - name: Start Tailscale and Get Login URL
      shell: powershell
      run: |
        $ts = "C:\Program Files\Tailscale\tailscale.exe"
        Start-Process -FilePath $ts -ArgumentList "up","--reset" `
          -RedirectStandardOutput "$env:TEMP\ts_out.txt" `
          -RedirectStandardError "$env:TEMP\ts_err.txt" `
          -NoNewWindow -PassThru
        Start-Sleep -Seconds 25
        $out = (Get-Content "$env:TEMP\ts_out.txt" -ErrorAction SilentlyContinue) -join " "
        $err = (Get-Content "$env:TEMP\ts_err.txt" -ErrorAction SilentlyContinue) -join " "
        $all = "$out $err"
        $m = [regex]::Match($all, 'https://login\.tailscale\.com\S+')
        if ($m.Success) {
          Write-Host "=== TAILSCALE LOGIN URL - Mo link nay tren dien thoai ==="
          Write-Host $m.Value
          Write-Host "========================================================="
        } else {
          Write-Host "Full output: $all"
        }
        Write-Host "Waiting for login (max 10 min)..."
        for ($i = 0; $i -lt 60; $i++) {
          $status = (& $ts status 2>&1) -join " "
          if ($status -notlike "*NeedsLogin*" -and $status -notlike "*Logged out*" -and $status.Trim().Length -gt 20) {
            Write-Host "Tailscale connected!"
            & $ts ip -4
            break
          }
          if ($i % 12 -eq 0 -and $i -gt 0) {
            $up2 = (& $ts up 2>&1) -join " "
            $m2 = [regex]::Match($up2, 'https://login\.tailscale\.com\S+')
            if ($m2.Success) { Write-Host "Login URL: $($m2.Value)" }
          }
          Start-Sleep -Seconds 10
        }

    - name: Install Sunshine
      shell: powershell
      run: |
        $dlUrl = ""
        try {
          $api = Invoke-RestMethod "https://api.github.com/repos/LizardByte/Sunshine/releases/latest" -UseBasicParsing
          $asset = $api.assets | Where-Object { $_.name -like "*windows*installer*.exe" } | Select-Object -First 1
          $dlUrl = $asset.browser_download_url
        } catch {}
        if (-not $dlUrl) {
          $dlUrl = "https://github.com/LizardByte/Sunshine/releases/download/v0.23.1/sunshine-windows-installer.exe"
        }
        Write-Host "Downloading: $dlUrl"
        Invoke-WebRequest -Uri $dlUrl -OutFile "sunshine.exe" -UseBasicParsing
        Start-Process "sunshine.exe" -Args "/S" -Wait
        Start-Sleep -Seconds 20
        $found = @(
          "C:\Program Files\Sunshine\sunshine.exe",
          "C:\Program Files (x86)\Sunshine\sunshine.exe"
        ) | Where-Object { Test-Path $_ } | Select-Object -First 1
        if ($found) {
          Write-Host "Sunshine installed: $found"
          $found | Set-Content "$env:TEMP\ss_path.txt"
        } else {
          Write-Host "ERROR: sunshine.exe not found"
          Get-ChildItem "C:\Program Files" -Recurse -Filter "sunshine.exe" -ErrorAction SilentlyContinue
        }

    - name: Configure Sunshine Credentials
      shell: powershell
      run: |
        $ssExe = (Get-Content "$env:TEMP\ss_path.txt" -ErrorAction SilentlyContinue | Select-Object -First 1).Trim()
        if (-not $ssExe -or -not (Test-Path $ssExe)) {
          $ssExe = @(
            "C:\Program Files\Sunshine\sunshine.exe",
            "C:\Program Files (x86)\Sunshine\sunshine.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
        }
        $ssDir = Split-Path $ssExe -Parent
        $cfgDir = "$ssDir\config"
        if (-not (Test-Path $cfgDir)) { New-Item -ItemType Directory -Path $cfgDir -Force | Out-Null }
        $conf = "origin_web_ui_allowed = wan`nupnp = enabled`nport = 47989`naddress_family = both"
        Set-Content "$cfgDir\sunshine.conf" $conf -Encoding UTF8
        Write-Host "Setting credentials..."
        $creds = Start-Process $ssExe -ArgumentList "--creds","sunshine","sunshine123" -Wait -NoNewWindow -PassThru
        Start-Sleep -Seconds 3
        if (Test-Path "$cfgDir\credentials.json") {
          Write-Host "Credentials file OK"
        } else {
          Write-Host "Credentials file not found, checking other locations..."
          Get-ChildItem "$env:APPDATA\Sunshine","$env:ProgramData\Sunshine" -ErrorAction SilentlyContinue
        }
        $cfgDir | Set-Content "$env:TEMP\ss_cfg.txt"
        Write-Host "Config done - Login: sunshine / sunshine123"

    - name: Start Sunshine and Verify Port Open
      shell: powershell
      run: |
        $ssExe = (Get-Content "$env:TEMP\ss_path.txt" -ErrorAction SilentlyContinue | Select-Object -First 1).Trim()
        if (-not $ssExe) {
          $ssExe = @(
            "C:\Program Files\Sunshine\sunshine.exe",
            "C:\Program Files (x86)\Sunshine\sunshine.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
        }
        $cfgFile = "$((Get-Content "$env:TEMP\ss_cfg.txt" -ErrorAction SilentlyContinue | Select-Object -First 1).Trim())\sunshine.conf"

        # Thu start service truoc
        Get-Service | Where-Object { $_.Name -like "*sunshine*" } | ForEach-Object {
          Set-Service -Name $_.Name -StartupType Automatic
          Start-Service -Name $_.Name -ErrorAction SilentlyContinue
        }

        # Start exe truc tiep
        if (Test-Path $cfgFile) {
          Start-Process $ssExe -ArgumentList $cfgFile -WindowStyle Hidden
        } else {
          Start-Process $ssExe -WindowStyle Hidden
        }
        Write-Host "Sunshine started, waiting for port..."

        # Verify port 47990 mo - thu 15 lan
        $ok = $false
        for ($i = 1; $i -le 15; $i++) {
          Start-Sleep -Seconds 8
          $p90 = netstat -ano | findstr ":47990"
          $p89 = netstat -ano | findstr ":47989"
          $proc = Get-Process | Where-Object { $_.Name -like "*sunshine*" }
          Write-Host "Check $i/15 - Process: $($proc.Count) - Port 47990: $(if($p90){'OPEN'}else{'closed'}) - Port 47989: $(if($p89){'OPEN'}else{'closed'})"
          if ($p90 -or $p89) {
            Write-Host "SUCCESS - Sunshine is running and ports are open!"
            $ok = $true
            break
          }
          if (-not $proc) {
            Write-Host "Process died, restarting..."
            Start-Process $ssExe -WindowStyle Hidden
          }
        }
        if (-not $ok) {
          Write-Host "WARNING: Could not verify port after 2 min"
          netstat -ano | findstr "479"
        }

    - name: Print All Connection Info
      shell: powershell
      run: |
        $ts = "C:\Program Files\Tailscale\tailscale.exe"
        $tsIP = (& $ts ip -4 2>&1 | Select-Object -First 1).Trim()
        $hostname = hostname
        $p90 = if (netstat -ano | findstr ":47990") { "OPEN" } else { "CLOSED" }
        $p89 = if (netstat -ano | findstr ":47989") { "OPEN" } else { "CLOSED" }
        $proc = if (Get-Process | Where-Object { $_.Name -like "*sunshine*" }) { "RUNNING" } else { "NOT FOUND" }
        Write-Host "================================================"
        Write-Host "  STATUS CHECK"
        Write-Host "  Sunshine Process : $proc"
        Write-Host "  Port 47990 (Web) : $p90"
        Write-Host "  Port 47989       : $p89"
        Write-Host "================================================"
        Write-Host "  RDP INFO"
        Write-Host "  Username : WiNSOS"
        Write-Host "  Password : WiNSOS@2024!"
        Write-Host "  Address  : ${tsIP}:3389"
        Write-Host "================================================"
        Write-Host "  SUNSHINE WEB UI"
        Write-Host "  URL      : https://${tsIP}:47990"
        Write-Host "  Username : sunshine"
        Write-Host "  Password : sunshine123"
        Write-Host "================================================"
        Write-Host "  MOONLIGHT HOST IP: $tsIP"
        Write-Host "  MACHINE NAME     : $hostname"
        Write-Host "================================================"
        Write-Host "  HUONG DAN MOONLIGHT:"
        Write-Host "  1. Bat Tailscale phone - dang nhap cung account"
        Write-Host "  2. Mo Moonlight - Add Host - nhap IP: $tsIP"
        Write-Host "  3. Moonlight hien ma PIN 4 so"
        Write-Host "  4. Mo Chrome - https://${tsIP}:47990"
        Write-Host "     Bam Advanced - Proceed (unsafe)"
        Write-Host "     Hoac go chu: thisisunsafe"
        Write-Host "  5. Dang nhap sunshine/sunshine123 - tab PIN - nhap ma"
        Write-Host "  6. Done! Ket noi va choi game!"
        Write-Host "================================================"

    - name: Keep Alive with Sunshine Watchdog
      shell: powershell
      run: |
        $ts = "C:\Program Files\Tailscale\tailscale.exe"
        $ssExe = (Get-Content "$env:TEMP\ss_path.txt" -ErrorAction SilentlyContinue | Select-Object -First 1).Trim()
        if (-not $ssExe) {
          $ssExe = @(
            "C:\Program Files\Sunshine\sunshine.exe",
            "C:\Program Files (x86)\Sunshine\sunshine.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
        }
        $end = (Get-Date).AddMinutes(325)
        $tick = 0
        while ((Get-Date) -lt $end) {
          $mins = [math]::Round(($end - (Get-Date)).TotalMinutes)
          $ip = (& $ts ip -4 2>&1 | Select-Object -First 1).Trim()
          $proc = Get-Process | Where-Object { $_.Name -like "*sunshine*" }
          $port = netstat -ano | findstr ":47989"
          if (-not $proc -or -not $port) {
            Write-Host "[$([datetime]::Now.ToString('HH:mm:ss'))] Sunshine died! Restarting..."
            Start-Process $ssExe -WindowStyle Hidden
            Start-Sleep -Seconds 10
            Write-Host "Sunshine restarted"
          } else {
            Write-Host "[$([datetime]::Now.ToString('HH:mm:ss'))] Alive - $mins min left - IP: $ip - Sunshine: OK"
          }
          $tick++
          Start-Sleep -Seconds 300
        }
        Write-Host "Session ended."
